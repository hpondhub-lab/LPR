<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเลือกตั้งสภานักเรียนอันทรงเกียรติ</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="vintage-pattern"></div>
    <div class="container antique-container">
        <header>
            <h1 class="antique-title">การเลือกตั้งสภานักเรียน ประจำปี พ.ศ. 2569</h1>
            <div class="antique-border"></div>
        </header>

        <div class="tab-menu">
            <button class="tab-btn active" onclick="openTab('voting-section')">คูหาลงคะแนน</button>
            <button class="tab-btn" onclick="openTab('result-section')">ประกาศผลคะแนนสด</button>
        </div>

        <div id="voting-section" class="tab-content">
            <div id="candidate-list" class="grid-container antique-grid">
                <p>กำลังเตรียมรายชื่อผู้สมัคร...</p>
            </div>
            <div id="voted-message" class="hidden">
                <div class="alert antique-alert">ท่านได้ใช้สิทธิ์ลงคะแนนเรียบร้อยแล้ว</div>
            </div>
        </div>

        <div id="result-section" class="tab-content hidden">
            <h2 class="section-title">สรุปคะแนนเสียงปัจจุบัน</h2>
            <div id="live-results" class="results-container">
                </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
